<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador Perros vs Gatos</title>
    <!-- Importar TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 20px; background-color: #222; color: white;}
        video { width: 300px; height: 300px; object-fit: cover; border: 3px solid #4CAF50; border-radius: 10px; }
        #resultado { font-size: 24px; font-weight: bold; margin-top: 20px; padding: 10px;}
        .perro { color: #2196F3; } /* Azul para perro */
        .gato { color: #FF9800; } /* Naranja para gato */
    </style>
</head>
<body>

    <h2>🐶 Perro vs Gato 🐱</h2>
    <!-- Aquí se mostrará la cámara -->
    <video id="camara" autoplay playsinline></video>
    <div id="resultado">Cargando modelo...</div>

    <!-- Canvas oculto para procesar la imagen -->
    <canvas id="canvas" width="100" height="100" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('camara');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const resultadoDiv = document.getElementById('resultado');
        
        let modelo;

        // 1. Cargar la cámara del celular
        async function configurarCamara() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment', width: 300, height: 300 } // 'environment' usa la cámara trasera
                });
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => resolve(video);
                });
            } catch (error) {
                resultadoDiv.innerText = "Error: No hay acceso a la cámara.";
            }
        }

        // 2. Cargar tu modelo exportado (CORREGIDO)
async function cargarModelo() {
    resultadoDiv.innerText = "Cargando pesos matemáticos...";
    
    // Ahora busca el archivo en la misma ruta que el index.html
    modelo = await tf.loadGraphModel('./model.json'); 

    
    resultadoDiv.innerText = "¡Modelo Listo! Apunta la cámara.";
    predecirFotomagrama();
}

        // 3. Bucle de predicción en tiempo real
        async function predecirFotomagrama() {
            if (modelo) {
                // Dibujar el fotograma del video en nuestro canvas de 100x100
                ctx.drawImage(video, 0, 0, 100, 100);
                
                // Preprocesar imagen usando tensores de TFJS
                const tensor = tf.browser.fromPixels(canvas)
                    .mean(2) // Convertir a escala de grises (promediando canales RGB)
                    .expandDims(2) // Añadir la dimensión de color: (100, 100, 1)
                    .expandDims(0) // Añadir la dimensión del batch: (1, 100, 100, 1)
                    .div(255.0); // Normalizar de 0 a 1 (igual que en Colab)

                // Hacer la predicción
                const prediccion = await modelo.predict(tensor).data();
                const probabilidad = prediccion[0]; // Retorna un valor entre 0 y 1

                // Formatear el resultado
                if (probabilidad > 0.5) {
                    resultadoDiv.innerHTML = `<span class="perro">¡Es un PERRO! (${(probabilidad * 100).toFixed(1)}%)</span>`;
                } else {
                    resultadoDiv.innerHTML = `<span class="gato">¡Es un GATO! (${((1 - probabilidad) * 100).toFixed(1)}%)</span>`;
                }
                
                // Limpiar memoria de la tarjeta de video del celular
                tensor.dispose();
            }
            
            // Volver a llamar la función en el siguiente cuadro (loop)
            requestAnimationFrame(predecirFotomagrama);
        }

        // Iniciar la app
        async function iniciar() {
            await configurarCamara();
            await cargarModelo();
        }

        iniciar();
    </script>
</body>
</html>
